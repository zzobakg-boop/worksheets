<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>입법 시뮬레이션 — 법을 만드는 국회</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

:root {
  --bg:      #1a0e06;
  --frame:   #3d1f08;
  --gold:    #c8922a;
  --gold2:   #f0c060;
  --panel:   #1e1208;
  --border:  #6b3d10;
  --text:    #f0ddb8;
  --muted:   #9a7a50;
  --green:   #4caf50;
  --red:     #e53935;
  --blue:    #1976d2;
  --stat-bg: #0d0804;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px;
}

/* ── 전체 게임 프레임 ── */
.game-frame {
  width: 100%;
  max-width: 700px;
  border: 4px solid var(--border);
  border-radius: 6px;
  box-shadow: 0 0 40px rgba(200,146,42,0.2), inset 0 0 60px rgba(0,0,0,0.6);
  background: var(--panel);
  overflow: hidden;
  position: relative;
}

/* 장식 모서리 */
.game-frame::before, .game-frame::after {
  content: '❧';
  position: absolute;
  font-size: 1.4rem;
  color: var(--gold);
  opacity: 0.5;
  top: 6px;
}
.game-frame::before { left: 10px; }
.game-frame::after  { right: 10px; transform: scaleX(-1); }

/* ── 타이틀바 ── */
.title-bar {
  background: linear-gradient(to bottom, #3d1f08, #2a1205);
  border-bottom: 2px solid var(--border);
  padding: 8px 36px;
  text-align: center;
  font-size: 0.78rem;
  color: var(--gold2);
  letter-spacing: 3px;
  font-weight: 700;
}

/* ── 메인 영역 (캐릭터 + 스탯) ── */
.main-area {
  display: grid;
  grid-template-columns: 1fr 180px;
  min-height: 260px;
  border-bottom: 2px solid var(--border);
}

/* 캐릭터 씬 */
.scene {
  background: linear-gradient(to bottom, #0d0a14, #1a1020);
  position: relative;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 8px;
  border-right: 2px solid var(--border);
  min-height: 260px;
  overflow: hidden;
}

/* 배경 효과 */
.scene::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 40%, rgba(100,80,200,0.08) 0%, transparent 70%);
}

/* 캐릭터 (이모지 기반) */
.character {
  font-size: 6rem;
  line-height: 1;
  filter: drop-shadow(0 0 12px rgba(100,80,255,0.3));
  transition: all 0.3s;
  position: relative;
  z-index: 2;
  user-select: none;
}
.character.talk { animation: talk 0.4s ease; }
@keyframes talk { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.character.shock { animation: shock 0.5s ease; }
@keyframes shock { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-8deg)} 75%{transform:rotate(8deg)} }
.character.happy { animation: happy 0.6s ease; }
@keyframes happy { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }

/* 씬 레이블 */
.scene-label {
  position: absolute;
  top: 10px; left: 10px;
  background: rgba(0,0,0,0.7);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 0.68rem;
  color: var(--gold);
  padding: 3px 8px;
  letter-spacing: 1px;
}

/* 스텝 진행 */
.step-progress {
  position: absolute;
  bottom: 8px; left: 8px; right: 8px;
  display: flex;
  gap: 4px;
  z-index: 3;
}
.step-pip {
  flex: 1; height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  transition: background 0.4s;
}
.step-pip.done   { background: var(--green); }
.step-pip.active { background: var(--gold2); }

/* ── 스탯창 (프린세스메이커) ── */
.stat-panel {
  background: var(--stat-bg);
  padding: 10px 10px 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.stat-header {
  text-align: center;
  font-size: 0.72rem;
  color: var(--gold);
  letter-spacing: 2px;
  margin-bottom: 4px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 4px;
}

.stat-row {
  display: flex;
  align-items: center;
  gap: 4px;
}
.stat-label {
  font-size: 0.72rem;
  color: var(--muted);
  min-width: 52px;
  text-align: right;
}
.stat-colon { font-size: 0.72rem; color: var(--muted); }
.stat-value {
  font-size: 0.72rem;
  color: var(--text);
  min-width: 28px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.stat-bar-wrap {
  flex: 1;
  height: 6px;
  background: #1a1005;
  border: 1px solid #3d2a10;
  border-radius: 3px;
  overflow: hidden;
}
.stat-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s ease;
}

/* ── 이름 + 대화창 (역전재판) ── */
.dialog-area {
  border-bottom: 2px solid var(--border);
  background: #0a0806;
}

.speaker-tag {
  background: var(--frame);
  border-right: 2px solid var(--border);
  border-bottom: 1px solid var(--border);
  display: inline-block;
  padding: 4px 14px;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--gold2);
  letter-spacing: 1px;
  min-width: 100px;
}

.dialog-text {
  padding: 12px 16px;
  font-size: 0.88rem;
  line-height: 1.8;
  min-height: 72px;
  color: var(--text);
}
.dialog-text .hl { color: var(--gold2); font-weight: 700; }
.dialog-text .red { color: #ff6b6b; font-weight: 700; }
.dialog-text .grn { color: #69f0ae; font-weight: 700; }

/* 타이핑 커서 */
.cursor { display: inline-block; animation: blink 0.7s infinite; color: var(--gold2); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── 증거/아이템 패널 ── */
.evidence-bar {
  display: flex;
  gap: 6px;
  padding: 6px 10px;
  background: #120d06;
  border-bottom: 2px solid var(--border);
  overflow-x: auto;
}
.evidence-item {
  background: var(--stat-bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 0.68rem;
  color: var(--muted);
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.evidence-item.unlocked {
  border-color: var(--gold);
  color: var(--gold2);
}
.evidence-item:hover.unlocked { background: #2a1a06; }

/* ── 선택지 메뉴 (프린세스메이커) ── */
.menu-area {
  background: linear-gradient(to bottom, #1a0e04, #120a02);
  padding: 8px;
}
.menu-title {
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 2px;
  margin-bottom: 6px;
  padding-left: 4px;
}
.menu-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.menu-item {
  background: rgba(61,31,8,0.4);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 9px 14px;
  font-size: 0.88rem;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all 0.15s;
  font-family: inherit;
  text-align: left;
  width: 100%;
}
.menu-item::before {
  content: '▶';
  color: var(--gold);
  font-size: 0.7rem;
  opacity: 0;
  transition: opacity 0.1s;
}
.menu-item:hover {
  background: rgba(100,60,10,0.5);
  border-color: var(--gold2);
  color: var(--gold2);
}
.menu-item:hover::before { opacity: 1; }
.menu-item .item-sub {
  font-size: 0.72rem;
  color: var(--muted);
  margin-left: auto;
}

/* ── 하단 조작 힌트 ── */
.hint-bar {
  background: var(--frame);
  border-top: 2px solid var(--border);
  padding: 5px 14px;
  display: flex;
  justify-content: flex-end;
  gap: 20px;
  font-size: 0.72rem;
  color: var(--muted);
}
.hint-bar span { display: flex; align-items: center; gap: 4px; }
.hint-key {
  background: var(--stat-bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 6px;
  color: var(--gold);
  font-weight: 700;
}

/* ── 결과 오버레이 ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.overlay.show { display: flex; }
.result-box {
  max-width: 480px;
  width: 100%;
  background: var(--panel);
  border: 3px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.result-header {
  padding: 16px 20px;
  font-size: 1.2rem;
  font-weight: 900;
  text-align: center;
  letter-spacing: 2px;
}
.result-header.success { background: #0d2a0d; color: var(--green); border-bottom: 2px solid var(--green); }
.result-header.failure { background: #2a0d0d; color: var(--red);   border-bottom: 2px solid var(--red); }
.result-header.neutral { background: #1a1a0d; color: var(--gold2); border-bottom: 2px solid var(--gold); }
.result-body { padding: 16px 20px; font-size: 0.88rem; line-height: 1.8; color: var(--muted); }
.result-body strong { color: var(--text); }
.result-btns { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); }
.rbtn {
  flex: 1; padding: 10px; border: none; border-radius: 4px;
  font-family: inherit; font-size: 0.88rem; font-weight: 700;
  cursor: pointer; transition: opacity 0.15s;
}
.rbtn:hover { opacity: 0.85; }
.rbtn-gold { background: var(--gold); color: #1a0e06; }
.rbtn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }

/* ── 개표 애니 ── */
.vote-wrap { padding: 0 20px 12px; }
.vote-row { margin-bottom: 10px; }
.vote-label { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 4px; }
.vbar { height: 10px; background: #1a0e04; border-radius: 5px; overflow: hidden; border: 1px solid var(--border); }
.vfill { height: 100%; border-radius: 5px; transition: width 1.2s ease; width: 0; }
.vfill.g { background: var(--green); }
.vfill.r { background: var(--red); }

/* ── 스코어 ── */
.score-list { display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }
.score-item { display: flex; justify-content: space-between; align-items: center; background: #0d0804; border-radius: 4px; padding: 7px 12px; font-size: 0.82rem; }
.score-item .ok  { color: var(--green); font-weight: 700; }
.score-item .bad { color: var(--red);   font-weight: 700; }

/* 인트로 */
.intro-screen {
  display: flex; flex-direction: column;
  align-items: center; gap: 14px;
  padding: 32px 20px 24px;
  text-align: center;
}
.intro-title { font-size: 1.5rem; font-weight: 900; color: var(--gold2); letter-spacing: 2px; }
.intro-sub { font-size: 0.82rem; color: var(--muted); }
.intro-desc { font-size: 0.88rem; line-height: 1.9; color: var(--text); max-width: 400px; }
.intro-stats { display: flex; gap: 16px; }
.istat { background: var(--stat-bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 16px; text-align: center; }
.istat .iv { font-size: 1.3rem; font-weight: 900; color: var(--gold2); }
.istat .il { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
.start-btn {
  background: linear-gradient(to bottom, var(--gold2), var(--gold));
  color: #1a0e06; border: none; border-radius: 4px;
  padding: 12px 40px; font-family: inherit; font-size: 1rem;
  font-weight: 900; cursor: pointer; letter-spacing: 2px;
  transition: all 0.15s;
}
.start-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
</style>
</head>
<body>

<div class="game-frame" id="gameFrame">

  <!-- ────── 인트로 화면 ────── -->
  <div id="introScreen">
    <div class="title-bar">⚜ 중3 사회 · Ⅱ. 헌법과 국가 기관 ⚜</div>
    <div class="intro-screen">
      <div style="font-size:4rem">🏛️</div>
      <div>
        <div class="intro-title">입법 시뮬레이션</div>
        <div class="intro-sub">법을 만드는 국회 — 8차시</div>
      </div>
      <div class="intro-desc">
        당신은 <strong style="color:var(--gold2)">국회의원</strong>입니다.<br>
        「학교 스마트폰 보관함 의무 설치법」을 발의했습니다.<br>
        5단계를 모두 통과해 법률로 만들어보세요.
      </div>
      <div class="intro-stats">
        <div class="istat"><div class="iv">5</div><div class="il">단계</div></div>
        <div class="istat"><div class="iv">8</div><div class="il">분기점</div></div>
        <div class="istat"><div class="iv">4</div><div class="il">결말</div></div>
      </div>
      <button class="start-btn" onclick="startGame()">▶  시작</button>
    </div>
    <div class="hint-bar">
      <span><span class="hint-key">클릭</span> 선택</span>
      <span><span class="hint-key">?</span> 증거 확인</span>
    </div>
  </div>

  <!-- ────── 게임 화면 ────── -->
  <div id="gameScreen" style="display:none">
    <div class="title-bar" id="titleBar">⚜ 입법 시뮬레이션 ⚜</div>

    <!-- 메인: 씬 + 스탯 -->
    <div class="main-area">
      <div class="scene">
        <div class="scene-label" id="sceneLabel">국회의사당</div>
        <div class="character" id="character">🧑‍⚖️</div>
        <div class="step-progress" id="stepProgress"></div>
      </div>
      <div class="stat-panel">
        <div class="stat-header">— 의원 스탯 —</div>
        <!-- 동적 렌더 -->
        <div id="statRows"></div>
      </div>
    </div>

    <!-- 대화창 -->
    <div class="dialog-area">
      <div class="speaker-tag" id="speakerTag">국회의장</div>
      <div class="dialog-text" id="dialogText"><span class="cursor">▌</span></div>
    </div>

    <!-- 증거 패널 -->
    <div class="evidence-bar" id="evidenceBar"></div>

    <!-- 선택지 -->
    <div class="menu-area">
      <div class="menu-title" id="menuTitle">▼ 행동을 선택하세요</div>
      <div class="menu-list" id="menuList"></div>
    </div>

    <div class="hint-bar">
      <span><span class="hint-key">클릭</span> 선택</span>
      <span><span class="hint-key">?</span> 증거 확인</span>
    </div>
  </div>
</div>

<!-- ────── 결과 오버레이 ────── -->
<div class="overlay" id="overlay">
  <div class="result-box">
    <div class="result-header" id="resultHeader"></div>
    <div class="result-body"  id="resultBody"></div>
    <div class="vote-wrap"    id="voteWrap" style="display:none">
      <div class="vote-row">
        <div class="vote-label"><span style="color:var(--green)">찬성</span><span id="yesCount" style="color:var(--green)">0표</span></div>
        <div class="vbar"><div class="vfill g" id="yesFill"></div></div>
      </div>
      <div class="vote-row">
        <div class="vote-label"><span style="color:var(--red)">반대</span><span id="noCount" style="color:var(--red)">0표</span></div>
        <div class="vbar"><div class="vfill r" id="noFill"></div></div>
      </div>
    </div>
    <div id="scoreboard" style="padding:0 20px 12px;display:none"></div>
    <div class="result-btns" id="resultBtns"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
// 상태
// ─────────────────────────────────────────
let gs = {};

const STATS_DEF = [
  { key:'설득력',  max:100, color:'#c8922a' },
  { key:'입법지식',max:100, color:'#5c9eff' },
  { key:'지지도',  max:100, color:'#4caf50' },
  { key:'청렴도',  max:100, color:'#e040fb' },
  { key:'체력',    max:100, color:'#ff7043' },
  { key:'스트레스',max:100, color:'#90a4ae' },
];

const STEPS_LABEL = ['제출','위원회','본회의','대통령','시행'];
const EVIDENCE_DEF = [
  { id:'헌법52조', label:'📜 헌법 제52조', desc:'국회의원과 정부는 법률안을 제출할 수 있다.' },
  { id:'위원회', label:'📋 상임위원회', desc:'전문 분야별로 법안을 먼저 심의하는 조직' },
  { id:'의결기준', label:'⚖️ 의결 기준', desc:'재적과반 출석 + 출석과반 찬성 → 일반의결' },
  { id:'거부권', label:'🚫 거부권', desc:'대통령이 15일 내 국회에 재의를 요구할 수 있는 권한' },
  { id:'재의결', label:'🗳️ 재의결', desc:'재적과반 출석 + 출석 2/3 찬성 → 재의결 성공' },
];

function startGame() {
  gs = {
    step: 1,
    stats: { 설득력:60, 입법지식:50, 지지도:55, 청렴도:80, 체력:90, 스트레스:20 },
    evidence: ['헌법52조'],
    choices: {},
    correct: 0, total: 0,
  };
  document.getElementById('introScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';
  renderStepBar();
  renderStats();
  renderEvidence();
  runStep1();
}

// ─── UI 헬퍼 ───
function setScene(emoji, label, anim) {
  const c = document.getElementById('character');
  c.textContent = emoji;
  c.className = 'character' + (anim ? ' ' + anim : '');
  document.getElementById('sceneLabel').textContent = label;
}
function setSpeaker(name) { document.getElementById('speakerTag').textContent = name; }
function setTitle(t) { document.getElementById('titleBar').textContent = '⚜ ' + t + ' ⚜'; }

let typingTimer = null;
function typeText(txt, cb) {
  clearTimeout(typingTimer);
  const el = document.getElementById('dialogText');
  el.innerHTML = '';
  let i = 0;
  function tick() {
    if (i < txt.length) {
      el.innerHTML = txt.slice(0, ++i) + '<span class="cursor">▌</span>';
      typingTimer = setTimeout(tick, 22);
    } else {
      el.innerHTML = txt + '<span class="cursor">▌</span>';
      if (cb) cb();
    }
  }
  tick();
}
// html 바로 set (타이핑 없이)
function setDialog(html) {
  clearTimeout(typingTimer);
  document.getElementById('dialogText').innerHTML = html + '<span class="cursor">▌</span>';
}

function setMenu(title, items) {
  document.getElementById('menuTitle').textContent = '▼ ' + title;
  const ml = document.getElementById('menuList');
  ml.innerHTML = '';
  items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'menu-item';
    btn.innerHTML = `<span>${item.icon || '　'} ${item.label}</span><span class="item-sub">${item.sub || ''}</span>`;
    btn.onclick = item.action;
    ml.appendChild(btn);
  });
}

function renderStepBar() {
  const el = document.getElementById('stepProgress');
  el.innerHTML = STEPS_LABEL.map((_, i) => {
    const cls = i + 1 < gs.step ? 'done' : i + 1 === gs.step ? 'active' : '';
    return `<div class="step-pip ${cls}" title="${STEPS_LABEL[i]}"></div>`;
  }).join('');
}

function renderStats() {
  const el = document.getElementById('statRows');
  el.innerHTML = STATS_DEF.map(s => {
    const v = gs.stats[s.key];
    const pct = Math.min(100, Math.max(0, v / s.max * 100));
    return `
      <div class="stat-row">
        <span class="stat-label">${s.key}</span>
        <span class="stat-colon"> :</span>
        <span class="stat-value">${v}</span>
        <div class="stat-bar-wrap">
          <div class="stat-bar-fill" style="width:${pct}%;background:${s.color}"></div>
        </div>
      </div>`;
  }).join('');
}

function adjustStats(changes) {
  Object.entries(changes).forEach(([k, v]) => {
    gs.stats[k] = Math.min(100, Math.max(0, (gs.stats[k] || 0) + v));
  });
  renderStats();
}

function renderEvidence() {
  const bar = document.getElementById('evidenceBar');
  bar.innerHTML = EVIDENCE_DEF.map(e => {
    const locked = !gs.evidence.includes(e.id);
    return `<div class="evidence-item ${locked ? '' : 'unlocked'}"
      title="${locked ? '?' : e.desc}"
      onclick="${locked ? '' : `alert('${e.label}\\n\\n${e.desc}')`}">
      ${locked ? '🔒' : ''} ${locked ? '???' : e.label}
    </div>`;
  }).join('');
}

function unlockEvidence(id) {
  if (!gs.evidence.includes(id)) {
    gs.evidence.push(id);
    renderEvidence();
  }
}

// ─── STEP 1: 법률안 제출 ───
function runStep1() {
  gs.step = 1; renderStepBar();
  setScene('🧑‍⚖️', '국회의사당', 'talk');
  setSpeaker('국회의원 (나)');
  setTitle('STEP 1 — 법률안 제출');
  typeText('「학교 스마트폰 보관함 의무 설치법」을 준비했다.\n헌법 제52조에 따라 법률안을 제출해야 한다.\n누구의 이름으로 제출할까?');
  setMenu('제출 방법을 선택하세요', [
    { icon:'🧑‍⚖️', label:'의원 발의로 제출', sub:'10인 이상 서명', action: () => s1choose('의원') },
    { icon:'🏢', label:'정부 제출로 낸다',  sub:'교육부 장관',   action: () => s1choose('정부') },
    { icon:'🙋', label:'나 혼자 제출한다',  sub:'단독 발의',     action: () => s1choose('혼자') },
  ]);
}

function s1choose(v) {
  gs.choices.s1 = v; gs.total++;
  if (v === '혼자') {
    setScene('😰', '국회 접수처', 'shock');
    setSpeaker('접수 직원');
    typeText('의원 발의는 <span class="red">10인 이상</span>의 공동 서명이 필요합니다.\n혼자서는 제출할 수 없습니다!');
    adjustStats({ 입법지식: -10, 스트레스: +15 });
    setMenu('어떻게 할까요?', [
      { icon:'↩️', label:'다시 선택한다', action: runStep1 },
    ]);
  } else {
    gs.correct++;
    unlockEvidence('헌법52조');
    adjustStats({ 입법지식: +15, 지지도: +10 });
    setScene('✅', '국회 접수처', 'happy');
    setSpeaker('접수 직원');
    const msg = v === '정부'
      ? '정부 제출 법안이 접수되었습니다. 국무회의 심의를 거쳤으므로 신뢰도가 높습니다.'
      : '의원 발의 법안이 접수되었습니다. 동료 의원 10명의 서명을 받았군요. 훌륭합니다!';
    typeText(msg, () => {
      setMenu('다음 단계로', [
        { icon:'➡️', label:'STEP 2 — 위원회 회부', action: runStep2 },
      ]);
    });
  }
}

// ─── STEP 2: 위원회 ───
function runStep2() {
  gs.step = 2; renderStepBar();
  unlockEvidence('위원회');
  setScene('📋', '위원회 회의실', 'talk');
  setSpeaker('국회의장');
  setTitle('STEP 2 — 위원회 회부');
  typeText('법안이 접수되었습니다.\n어느 상임위원회로 회부할까요?');
  setMenu('위원회를 선택하세요', [
    { icon:'📚', label:'교육위원회',    sub:'학교·교육 담당', action: () => s2choose('교육') },
    { icon:'⚖️', label:'법제사법위원회', sub:'법체계 검토',   action: () => s2choose('법사') },
    { icon:'🪖', label:'국방위원회',    sub:'군사·안보',      action: () => s2choose('국방') },
  ]);
}

function s2choose(v) {
  gs.choices.s2 = v; gs.total++;
  if (v === '국방') {
    setScene('😱', '국방위 회의실', 'shock');
    setSpeaker('국방위원장');
    typeText('이건... 학교 법안이잖습니까?\n<span class="red">국방위원회 소관이 아닙니다.</span>\n교육위원회로 다시 보내야 합니다.');
    adjustStats({ 스트레스: +20, 지지도: -15 });
    setMenu('어떻게 할까요?', [
      { icon:'↩️', label:'위원회를 다시 선택한다', action: runStep2 },
    ]);
  } else {
    gs.correct++;
    adjustStats({ 입법지식: +10, 설득력: +5 });
    const extra = v === '법사' ? '\n법사위는 모든 법안의 체계·자구를 최종 점검합니다. 교육위 심의 후 법사위도 거칩니다!' : '';
    setScene('🗣️', '교육위 심의실', 'talk');
    setSpeaker('교육위원장');
    typeText('교육위원회에서 <span class="grn">심의를 시작</span>합니다.' + extra, () => {
      setMenu('다음 단계로', [
        { icon:'➡️', label:'STEP 3 — 본회의 표결', action: runStep3 },
      ]);
    });
  }
}

// ─── STEP 3: 본회의 ───
function runStep3() {
  gs.step = 3; renderStepBar();
  unlockEvidence('의결기준');
  setScene('🏛️', '본회의장', 'talk');
  setSpeaker('국회의장');
  setTitle('STEP 3 — 본회의 표결');
  typeText('교육위원회 심의를 통과했습니다!\n이제 전체 의원 300명 앞에서 표결합니다.\n통과 기준: <span class="hl">재적과반 출석 + 출석과반 찬성</span>\n분위기가 팽팽합니다. 전략은?');
  setMenu('표결 전략을 선택하세요', [
    { icon:'🗣️', label:'반대 의원들을 적극 설득한다', sub:'발언 5분', action: () => s3choose('설득') },
    { icon:'✏️', label:'수정안을 제출한다',           sub:'일부 양보', action: () => s3choose('수정') },
    { icon:'🚀', label:'표결을 강행한다',             sub:'즉시 표결', action: () => s3choose('강행') },
  ]);
}

function s3choose(v) {
  gs.choices.s3 = v; gs.total++;
  if (v === '강행') {
    setScene('💔', '본회의장', 'shock');
    setSpeaker('국회의장');
    adjustStats({ 지지도: -25, 스트레스: +20 });
    typeText('<span class="red">부결!</span> 찬성 143 — 반대 157\n과반수에 7표 모자랐습니다.\n법안이 폐기됩니다...');
    setTimeout(() => showResult('failure', '📋 법안 부결',
      '강행 표결 결과 과반수를 얻지 못했습니다.\n\n✦ 본회의 의결 기준: 재적과반 출석 + 출석과반 찬성\n✦ 팽팽한 상황에서는 반대 의원 설득이 핵심입니다.',
      false), 1800);
  } else {
    gs.correct++;
    const votes = v === '수정' ? [178, 122] : [162, 138];
    adjustStats({ 설득력: +15, 지지도: +20, 스트레스: -10 });
    setScene('🎉', '본회의장', 'happy');
    setSpeaker('국회의장');
    typeText(`<span class="grn">가결!</span> 찬성 ${votes[0]} — 반대 ${votes[1]}\n본회의를 통과했습니다!`, () => {
      setMenu('다음 단계로', [
        { icon:'➡️', label:'STEP 4 — 대통령에게 이송', action: runStep4 },
      ]);
    });
  }
}

// ─── STEP 4: 대통령 ───
function runStep4() {
  gs.step = 4; renderStepBar();
  unlockEvidence('거부권');
  setScene('📨', '청와대', 'talk');
  setSpeaker('대통령 비서실');
  setTitle('STEP 4 — 대통령 거부권');
  typeText('본회의를 통과한 법안이 청와대로 이송되었습니다.\n\n그런데... <span class="red">대통령이 거부권을 행사했습니다!</span>\n"학교 자율성을 침해할 수 있다"는 이유입니다.\n어떻게 대응하시겠습니까?');
  setMenu('대응 방법을 선택하세요', [
    { icon:'🗳️', label:'재의결을 요청한다',         sub:'2/3 찬성 필요', action: () => s4choose('재의결') },
    { icon:'🔧', label:'법안을 수정해서 재제출',     sub:'다음 회기',     action: () => s4choose('수정') },
    { icon:'🏳️', label:'이번엔 포기한다',           sub:'법안 폐기',     action: () => s4choose('포기') },
  ]);
}

function s4choose(v) {
  gs.choices.s4 = v; gs.total++;
  if (v === '포기') {
    setScene('😔', '국회복도', '');
    adjustStats({ 지지도: -20, 스트레스: +25 });
    showResult('failure', '🏳️ 법안 폐기',
      '포기를 선택해 법안이 폐기되었습니다.\n\n✦ 대통령 거부권 행사 시, 국회는 재의결로 맞설 수 있습니다.\n✦ 재적과반 출석 + 출석 2/3 이상 찬성 시 대통령 서명 없이도 법률 확정!',
      false);
  } else if (v === '수정') {
    setScene('🔧', '의원실', 'talk');
    adjustStats({ 입법지식: +10, 스트레스: +10 });
    showResult('neutral', '🔧 수정 후 재도전',
      '대통령 의견을 반영해 법안을 수정했습니다.\n다음 회기에 더 강력하게 돌아올 것입니다!\n\n✦ 삼권분립의 견제 기능이 작동한 사례입니다.\n✦ 대통령의 거부권 → 국회의 재의결 요구권',
      false);
  } else {
    gs.correct++;
    unlockEvidence('재의결');
    adjustStats({ 설득력: +20, 입법지식: +15 });
    runStep5();
  }
}

// ─── STEP 5: 재의결 ───
function runStep5() {
  gs.step = 5; renderStepBar();
  setScene('🗳️', '본회의장 — 재의결', 'talk');
  setSpeaker('국회의장');
  setTitle('STEP 5 — 재의결');
  typeText('재의결을 진행합니다.\n재적 300명 중 200명 출석.\n2/3 기준: <span class="hl">134표 이상</span> 찬성 필요.\n\n개표를 시작하겠습니까?');
  setMenu('', [
    { icon:'🗳️', label:'개표 시작!', action: countVotes },
  ]);
}

function countVotes() {
  document.getElementById('menuList').innerHTML = '';
  setScene('⏳', '개표 중...', '');
  setSpeaker('선거관리위원장');
  setDialog('재의결 개표 결과를 집계하는 중입니다...');

  showOverlay('neutral', '🗳️ 재의결 개표');
  document.getElementById('voteWrap').style.display = 'block';
  document.getElementById('resultBody').innerHTML = '<div style="padding:0 0 8px;font-size:0.82rem;color:var(--muted)">200명 출석 · 통과 기준: 134표 이상</div>';
  document.getElementById('resultBtns').innerHTML = '';

  const yes = 141, no = 59, total = 200;
  let y = 0, n = 0;
  const iv = setInterval(() => {
    y = Math.min(y + 4, yes);
    n = Math.min(n + 1, no);
    document.getElementById('yesCount').textContent = y + '표';
    document.getElementById('noCount').textContent = n + '표';
    document.getElementById('yesFill').style.width = (y / total * 100) + '%';
    document.getElementById('noFill').style.width  = (n / total * 100) + '%';
    if (y >= yes && n >= no) {
      clearInterval(iv);
      gs.correct++;
      adjustStats({ 지지도: +30, 스트레스: -20, 체력: -15 });
      setTimeout(() => finalSuccess(), 800);
    }
  }, 35);
}

function finalSuccess() {
  closeOverlay();
  setScene('🎉', '공포식장', 'happy');
  setSpeaker('대통령');
  typeText('재의결 성공! 141 : 59\n<span class="grn">「학교 스마트폰 보관함 의무 설치법」\n이 공포됩니다!</span> 20일 뒤 시행.', () => {
    setMenu('', [
      { icon:'🏆', label:'최종 결과 확인', action: showFinalResult },
    ]);
  });
}

function showFinalResult() {
  const steps = [
    { label:'STEP1 법률안 제출', ok: gs.choices.s1 !== '혼자' },
    { label:'STEP2 위원회 선택', ok: gs.choices.s2 !== '국방' },
    { label:'STEP3 본회의 전략', ok: gs.choices.s3 !== '강행' },
    { label:'STEP4 거부권 대응', ok: gs.choices.s4 === '재의결' },
  ];
  const board = document.getElementById('scoreboard');
  board.style.display = 'block';
  board.innerHTML = `<div class="score-list">${steps.map(s =>
    `<div class="score-item"><span>${s.label}</span><span class="${s.ok ? 'ok' : 'bad'}">${s.ok ? '✅ 정답' : '❌ 재도전'}</span></div>`
  ).join('')}</div>`;

  showOverlay('success', '🏆 법률 제정 성공!');
  document.getElementById('resultBody').innerHTML =
    '「학교 스마트폰 보관함 의무 설치법」이 공포되어<br>20일 뒤부터 시행됩니다.<br><br>' +
    '<strong>입법 절차 요약:</strong><br>' +
    '법률안 제출 → 위원회 심의 → 본회의 의결<br>→ 대통령 공포 (거부권 → 재의결) → 시행';
  document.getElementById('scoreboard').style.display = 'block';
  document.getElementById('resultBtns').innerHTML =
    '<button class="rbtn rbtn-gold" onclick="location.reload()">🔄 다시 하기</button>';
}

// ─── 오버레이 ───
function showOverlay(type, title) {
  document.getElementById('resultHeader').className = 'result-header ' + type;
  document.getElementById('resultHeader').textContent = title;
  document.getElementById('overlay').classList.add('show');
}
function closeOverlay() { document.getElementById('overlay').classList.remove('show'); }

function showResult(type, title, body, restart) {
  document.getElementById('voteWrap').style.display = 'none';
  document.getElementById('scoreboard').style.display = 'none';
  showOverlay(type, title);
  document.getElementById('resultBody').innerHTML = body.replace(/\n/g, '<br>');
  document.getElementById('resultBtns').innerHTML =
    '<button class="rbtn rbtn-gold" onclick="location.reload()">🔄 다시 도전</button>' +
    '<button class="rbtn rbtn-outline" onclick="closeOverlay()">계속 보기</button>';
}
</script>
</body>
</html>
